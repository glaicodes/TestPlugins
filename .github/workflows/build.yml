name: Build

# https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#concurrency
concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      # choose your default branch
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          path: "src"

      - name: Checkout builds
        uses: actions/checkout@master
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: |
          rm $GITHUB_WORKSPACE/builds/*.cs3 || true
          rm $GITHUB_WORKSPACE/builds/*.jar || true

      - name: Setup JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      # Caches gradle wrapper, dependencies and build cache between CI runs
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # From upstream PR #37: lets CI cache the Gradle configuration cache.
          # Create the secret with: openssl rand -base64 16
          # (repo Settings -> Secrets and variables -> Actions -> GRADLE_ENCRYPTION_KEY)
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          ./gradlew ensureJarCompatibility
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds
          cp **/build/*.jar $GITHUB_WORKSPACE/builds || true
          cp build/plugins.json $GITHUB_WORKSPACE/builds

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          # Plain append commit — NOT --amend/--force. Force-pushing rewrote the same
          # commit, which raw.githubusercontent's CDN never reliably invalidated
          # (source of the multi-hour stale plugins.json / hash mismatch).
          # A new commit = new object = clean cache bust.
          git commit -m "Build $GITHUB_SHA" || exit 0   # do not error if nothing to commit
          git push
